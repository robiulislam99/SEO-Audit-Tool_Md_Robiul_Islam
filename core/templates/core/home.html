<!-- core/templates/core/home.html -->
{% extends "core/base.html" %}

{% block content %}
<div class="max-w-xl mx-auto mt-10">

    <!-- ============ INPUT SECTION ============ -->
    <div id="form-section" class="text-center">
        <h1 class="text-3xl font-bold text-gray-900 mb-3">Check your website's SEO</h1>
        <p class="text-gray-500 mb-8">Enter a URL and get an instant, actionable SEO report.</p>

        <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm text-left">
            <label class="block text-sm font-medium text-gray-700 mb-1">Website URL</label>
            <input type="url" id="url-input" placeholder="https://example.com" required
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">

            <label class="block text-sm font-medium text-gray-700 mt-4 mb-1">
                Target keyword <span class="text-gray-400">(optional)</span>
            </label>
            <input type="text" id="keyword-input" placeholder="e.g. seo audit tool"
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">

            <p id="form-error" class="text-red-600 text-sm mt-2 hidden"></p>

            <button id="submit-btn"
                class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition-colors">
                Run Audit
            </button>
        </div>
    </div>

    <!-- ============ LOADING SECTION (replace existing) ============ -->
<div id="loading-section" class="hidden text-center mt-10">
    <p class="text-lg font-medium text-gray-800 mb-1 break-all" id="loading-url"></p>
    <p class="text-gray-500 mb-8" id="loading-step">Getting started...</p>

    <div class="flex justify-center mb-8">
        <div class="h-10 w-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <!-- Progress steps, purely cosmetic, driven by elapsed time -->
    <div class="flex justify-center gap-2 text-xs text-gray-400">
        <span id="step-1" class="px-3 py-1 rounded-full bg-blue-100 text-blue-600 font-medium">Fetching page</span>
        <span id="step-2" class="px-3 py-1 rounded-full">Analyzing SEO</span>
        <span id="step-3" class="px-3 py-1 rounded-full">Calculating score</span>
    </div>
</div>

<!-- ============ ERROR SECTION (new) ============ -->
<div id="error-section" class="hidden mt-10">
    <div class="bg-white rounded-xl border border-red-200 shadow-sm p-8 text-center">
        <div class="mx-auto w-14 h-14 rounded-full bg-red-100 text-red-600 flex items-center justify-center text-2xl font-bold mb-4">
            !
        </div>
        <h2 class="text-lg font-semibold text-gray-900 mb-2" id="error-title">Couldn't complete this audit</h2>
        <p class="text-gray-500 mb-6" id="error-message">Something went wrong.</p>
        <button onclick="resetForm()"
            class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-5 py-2 rounded-lg transition-colors">
            Try again
        </button>
    </div>
</div>

    <!-- ============ REPORT SECTION ============ -->
    <div id="report-section" class="hidden mt-6"></div>

</div>

<script>
function getCookie(name) {
    const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return match ? match[2] : null;
}
const csrftoken = getCookie('csrftoken');

const formSection = document.getElementById('form-section');
const loadingSection = document.getElementById('loading-section');
const errorSection = document.getElementById('error-section');
const reportSection = document.getElementById('report-section');
const submitBtn = document.getElementById('submit-btn');
const formError = document.getElementById('form-error');

// ---------- Friendly error copy, keyed by backend error_type ----------
const ERROR_MESSAGES = {
    timeout: {
        title: "This site took too long to respond",
        hint: "Some sites are slow or block automated tools. Try again in a moment, or try a different page on the same site.",
    },
    dns_error: {
        title: "We couldn't find that website",
        hint: "Double-check the URL is spelled correctly, including 'https://' at the start.",
    },
    connection_refused: {
        title: "The site refused the connection",
        hint: "It may be down right now, or blocking automated visitors. Try again later.",
    },
    ssl_error: {
        title: "This site has a security certificate issue",
        hint: "We couldn't load it securely, so the audit couldn't run.",
    },
    invalid_url: {
        title: "That doesn't look like a valid URL",
        hint: "Make sure it starts with http:// or https:// and includes a valid domain.",
    },
    unknown: {
        title: "Something went wrong",
        hint: "An unexpected error occurred while auditing this site. Please try again.",
    },
};

function showFormError(message) {
    formError.textContent = message;
    formError.classList.remove('hidden');
}

function hideFormError() {
    formError.classList.add('hidden');
}

function resetSubmitButton() {
    submitBtn.disabled = false;
    submitBtn.textContent = "Run Audit";
}

// ---------- Basic client-side URL sanity check (fast feedback, no server round trip) ----------
function isLikelyValidUrl(value) {
    try {
        const parsed = new URL(value);
        return parsed.protocol === "http:" || parsed.protocol === "https:";
    } catch {
        return false;
    }
}

// ---------- Step 1: Submit ----------
submitBtn.addEventListener('click', async () => {
    let url = document.getElementById('url-input').value.trim();
    const keyword = document.getElementById('keyword-input').value.trim();

    hideFormError();

    if (!url) {
        showFormError("Please enter a URL to audit.");
        return;
    }

    // Auto-prepend https:// if the user forgot it — small UX kindness
    if (!/^https?:\/\//i.test(url)) {
        url = "https://" + url;
    }

    if (!isLikelyValidUrl(url)) {
        showFormError("That doesn't look like a valid URL. Example: https://example.com");
        return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Starting audit...";

    try {
        const res = await fetch("{% url 'audits:api_submit' %}", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": csrftoken,
            },
            body: JSON.stringify({ url: url, target_keyword: keyword }),
        });

        const data = await res.json();

        if (!res.ok) {
            showFormError(data.error || "Something went wrong. Please try again.");
            resetSubmitButton();
            return;
        }

        formSection.classList.add('hidden');
        loadingSection.classList.remove('hidden');
        document.getElementById('loading-url').textContent = url;

        startLoadingAnimation();
        pollAuditStatus(data.audit_id, Date.now());

    } catch (err) {
        showFormError("Network error — check your connection and try again.");
        resetSubmitButton();
    }
});

// ---------- Cosmetic step progression (gives a sense of progress even though we're just polling) ----------
function startLoadingAnimation() {
    const steps = ["step-1", "step-2", "step-3"];
    const labels = ["Fetching page...", "Analyzing SEO...", "Calculating score..."];
    let current = 0;

    steps.forEach(id => document.getElementById(id).className = "px-3 py-1 rounded-full");
    document.getElementById(steps[0]).className = "px-3 py-1 rounded-full bg-blue-100 text-blue-600 font-medium";
    document.getElementById('loading-step').textContent = labels[0];

    window._loadingInterval = setInterval(() => {
        current = Math.min(current + 1, steps.length - 1);
        steps.forEach(id => document.getElementById(id).className = "px-3 py-1 rounded-full");
        document.getElementById(steps[current]).className = "px-3 py-1 rounded-full bg-blue-100 text-blue-600 font-medium";
        document.getElementById('loading-step').textContent = labels[current];
    }, 4000);
}

function stopLoadingAnimation() {
    clearInterval(window._loadingInterval);
}

// ---------- Step 2: Poll, with a client-side timeout safety net ----------
const MAX_POLL_TIME_MS = 45000; // stop asking after 45s even if backend never updates

async function pollAuditStatus(auditId, startTime) {
    if (Date.now() - startTime > MAX_POLL_TIME_MS) {
        stopLoadingAnimation();
        showError("timeout");
        return;
    }

    try {
        const res = await fetch(`/audits/api/${auditId}/status/`);
        const data = await res.json();

        if (data.status === "completed") {
            stopLoadingAnimation();
            fetchAndRenderReport(auditId);
        } else if (data.status === "failed") {
            stopLoadingAnimation();
            showError(data.error_type || "unknown", data.error_message);
        } else {
            setTimeout(() => pollAuditStatus(auditId, startTime), 2000);
        }
    } catch (err) {
        // Network hiccup while polling — retry rather than failing immediately
        setTimeout(() => pollAuditStatus(auditId, startTime), 3000);
    }
}

// ---------- Error display ----------
function showError(errorType, customMessage) {
    loadingSection.classList.add('hidden');
    errorSection.classList.remove('hidden');

    const info = ERROR_MESSAGES[errorType] || ERROR_MESSAGES.unknown;
    document.getElementById('error-title').textContent = info.title;
    document.getElementById('error-message').textContent = customMessage || info.hint;
}

// ---------- Step 3: Fetch + render report (unchanged from before) ----------
async function fetchAndRenderReport(auditId) {
    try {
        const res = await fetch(`/audits/api/${auditId}/report/`);
        const data = await res.json();

        if (!res.ok) {
            showError("unknown", "The report couldn't be loaded. Please try again.");
            return;
        }

        renderReport(data);
        loadingSection.classList.add('hidden');
        reportSection.classList.remove('hidden');
    } catch (err) {
        showError("unknown", "The report couldn't be loaded. Please try again.");
    }
}

function renderReport(data) {
    // ... unchanged from previous step ...
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function resetForm() {
    stopLoadingAnimation();
    errorSection.classList.add('hidden');
    reportSection.classList.add('hidden');
    reportSection.innerHTML = '';
    formSection.classList.remove('hidden');
    document.getElementById('url-input').value = '';
    document.getElementById('keyword-input').value = '';
    hideFormError();
    resetSubmitButton();
}
</script>
{% endblock %}
