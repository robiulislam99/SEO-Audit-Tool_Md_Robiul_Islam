<!-- core/templates/core/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SEO Audit Tool{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0f172a;
            --muted: #64748b;
            --line: rgba(148, 163, 184, 0.24);
            --panel: rgba(255, 255, 255, 0.78);
            --accent: #0f766e;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: "Inter", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(15, 118, 110, 0.13), transparent 30%),
                radial-gradient(circle at top right, rgba(14, 165, 233, 0.14), transparent 28%),
                linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
            min-height: 100vh;
        }

        .glass-panel {
            background: var(--panel);
            backdrop-filter: blur(18px);
            border: 1px solid var(--line);
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
        }

        .section-title {
            font-family: "Space Grotesk", sans-serif;
            letter-spacing: -0.03em;
        }

        .subtle-grid {
            background-image: linear-gradient(rgba(148, 163, 184, 0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(148, 163, 184, 0.08) 1px, transparent 1px);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="min-h-screen text-slate-900">
    <div class="fixed inset-0 pointer-events-none subtle-grid opacity-60"></div>

    <nav class="sticky top-0 z-20 border-b border-white/70 bg-white/70 backdrop-blur-xl">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
            <a href="{% url 'home' %}" class="flex items-center gap-3">
                <span class="flex h-10 w-10 items-center justify-center rounded-2xl bg-teal-700 text-sm font-bold text-white shadow-lg shadow-teal-700/25">SA</span>
                <span class="text-base font-semibold tracking-tight text-slate-900">SEO Audit Tool</span>
            </a>
            <div class="hidden items-center gap-3 sm:flex">
                <span class="rounded-full border border-teal-200 bg-teal-50 px-4 py-2 text-xs font-semibold uppercase tracking-[0.24em] text-teal-700">Responsive audit dashboard</span>
            </div>
        </div>
    </nav>

    <main class="relative mx-auto max-w-7xl px-4 py-8 sm:px-6 sm:py-10 lg:px-8 lg:py-12">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
