<!-- core/templates/core/base.html -->
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SEO Audit Tool{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/site.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen text-slate-900">
    <div class="fixed inset-0 pointer-events-none subtle-grid opacity-60"></div>

    <nav class="sticky top-0 z-20 border-b border-white/70 bg-white/70 backdrop-blur-xl">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
            <a href="{% url 'home' %}" class="flex items-center gap-3">
                <span class="flex h-10 w-10 items-center justify-center rounded-2xl bg-teal-700 text-sm font-bold text-white shadow-lg shadow-teal-700/25">SA</span>
                <span class="text-base font-semibold tracking-tight text-slate-900">SEO Audit Tool</span>
            </a>
            <div class="hidden items-center gap-3 sm:flex">
                <a href="{% url 'audits:history' %}" class="rounded-full border border-slate-200 bg-white/80 px-4 py-2 text-xs font-semibold uppercase tracking-[0.24em] text-slate-700 transition hover:border-teal-200 hover:text-teal-700">History</a>
                <span class="rounded-full border border-teal-200 bg-teal-50 px-4 py-2 text-xs font-semibold uppercase tracking-[0.24em] text-teal-700">Responsive audit dashboard</span>
            </div>
        </div>
    </nav>

    <main class="relative mx-auto max-w-7xl px-4 py-8 sm:px-6 sm:py-10 lg:px-8 lg:py-12">
        {% block content %}{% endblock %}
    </main>

    {% block extra_scripts %}{% endblock %}

</body>
</html>
