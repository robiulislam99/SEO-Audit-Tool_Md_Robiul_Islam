<!-- audits/templates/audits/loading.html -->
{% extends "core/base.html" %}
{% load static %}

{% block content %}
<div class="mx-auto max-w-3xl">
    <div class="glass-panel rounded-[2rem] p-6 text-center sm:p-8">
        <div class="mx-auto mb-6 flex h-20 w-20 items-center justify-center rounded-full border-4 border-teal-500/15 border-t-teal-700 animate-spin"></div>
        <p class="text-sm font-semibold uppercase tracking-[0.22em] text-teal-700">Audit running</p>
        <h1 class="section-title mt-3 text-3xl font-bold text-slate-900 sm:text-4xl">Auditing your site now</h1>
        <p class="mx-auto mt-3 max-w-2xl break-all text-sm leading-6 text-slate-600">{{ audit.url }}</p>
        <div class="mt-6 rounded-2xl border border-slate-200 bg-white/80 px-4 py-3 text-sm text-slate-500">
            <span id="status-text">Status: {{ audit.status }}...</span>
        </div>
    </div>
</div>

{% block extra_scripts %}
<script>
    window.AUDIT_STATUS_URL = "{% url 'audits:status' audit.id %}";
</script>
<script src="{% static 'js/loading.js' %}" defer></script>
{% endblock %}
{% endblock %}
